<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>rusty-mermaid GPU Gallery (vello/WebGPU)</title>
  <style>
    :root { --bg: #f5f5f5; --card-bg: white; --text: #333; --text2: #555; --pre-bg: #f8f8f8; --border: #eee; --shadow: rgba(0,0,0,0.1); }
    :root.dark { --bg: #1e1e2e; --card-bg: #2d2d44; --text: #cdd6f4; --text2: #bac2de; --pre-bg: #252538; --border: #45475a; --shadow: rgba(0,0,0,0.4); }
    body { font-family: system-ui; max-width: 1200px; margin: 0 auto; padding: 20px; background: var(--bg); color: var(--text); transition: background 0.2s, color 0.2s; }
    h1 { color: var(--text); margin-bottom: 4px; }
    .subtitle { color: var(--text2); margin-bottom: 20px; font-size: 14px; }
    .header { display: flex; justify-content: space-between; align-items: center; }
    .controls { display: none; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    select { padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); font-size: 14px; background: var(--card-bg); color: var(--text); }
    .theme-btn { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 14px; color: var(--text); transition: background 0.2s; }
    .theme-btn:hover { opacity: 0.8; }
    .view-btn { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 14px; color: var(--text); }
    .view-btn.active { background: #9370db; color: white; border-color: #9370db; }
    .card { background: var(--card-bg); border-radius: 8px; padding: 16px; margin: 16px 0; box-shadow: 0 1px 3px var(--shadow); overflow: auto; transition: background 0.2s; }
    .card h2 { margin-top: 0; color: var(--text2); font-size: 16px; font-family: monospace; }
    .card img { max-width: 100%; border: 1px solid var(--border); border-radius: 4px; }
    .section-title { color: #9370db; font-size: 20px; margin: 24px 0 8px; border-bottom: 2px solid var(--border); padding-bottom: 4px; }
    canvas { display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }
    .error { color: #c33; padding: 20px; display: none; }
    .loading { color: var(--text2); padding: 20px; }
    .progress { color: var(--text2); font-size: 13px; }
    #single-view { display: none; }
    #gallery-view { display: none; }
    a { color: #9370db; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>rusty-mermaid GPU Gallery</h1>
      <p class="subtitle">Rendered via vello compute shaders on WebGPU &mdash; <span id="diagram-count"></span> diagrams</p>
    </div>
    <div style="display:flex;gap:8px">
      <button class="view-btn active" id="btn-gallery" onclick="showGallery()">Gallery</button>
      <button class="view-btn" id="btn-single" onclick="showSingle()">Single</button>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">Dark</button>
    </div>
  </div>

  <div class="controls" id="controls">
    <label for="diagram-select">Diagram:</label>
    <select id="diagram-select"></select>
  </div>

  <div id="loading" class="loading">Initializing WebGPU...</div>
  <div id="error" class="error"></div>

  <div id="single-view">
    <div class="card">
      <div id="diagram-name" style="font-family:monospace;color:var(--text2);margin-bottom:8px"></div>
      <canvas id="diagram-canvas"></canvas>
    </div>
  </div>

  <div id="gallery-view"></div>

  <script>
    var isDark = localStorage.getItem('rm-theme') === 'dark';
    if (isDark) document.documentElement.classList.add('dark');
    document.getElementById('theme-btn').textContent = isDark ? 'Light' : 'Dark';

    function toggleTheme() {
      isDark = !isDark;
      document.documentElement.classList.toggle('dark', isDark);
      document.getElementById('theme-btn').textContent = isDark ? 'Light' : 'Dark';
      localStorage.setItem('rm-theme', isDark ? 'dark' : 'light');
      // Re-render: reload the page to re-render all diagrams with new theme
      location.reload();
    }

    function showGallery() {
      document.getElementById('single-view').style.display = 'none';
      document.getElementById('gallery-view').style.display = 'block';
      document.getElementById('controls').style.display = 'none';
      document.getElementById('btn-gallery').classList.add('active');
      document.getElementById('btn-single').classList.remove('active');
    }

    function showSingle() {
      document.getElementById('single-view').style.display = 'block';
      document.getElementById('gallery-view').style.display = 'none';
      document.getElementById('controls').style.display = 'flex';
      document.getElementById('btn-gallery').classList.remove('active');
      document.getElementById('btn-single').classList.add('active');
    }
  </script>

  <script type="module">
    async function init() {
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');

      if (!navigator.gpu) {
        loading.style.display = 'none';
        error.style.display = 'block';
        error.textContent = 'WebGPU is not supported. Please use Chrome 113+ or Edge 113+.';
        return;
      }

      try {
        const wasm = await import('../pkg/rusty_mermaid_wasm_gallery.js');
        await wasm.default();
        loading.style.display = 'none';
      } catch (e) {
        loading.style.display = 'none';
        error.style.display = 'block';
        error.textContent = 'Failed to initialize: ' + (e.message || e);
        console.error(e);
      }
    }

    init();
  </script>
</body>
</html>
